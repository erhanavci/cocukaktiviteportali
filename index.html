<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <base href="/" />
    <title>Minik Kaşifler - Çocuk Aktivite Portalı</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="#home" data-route="home" aria-label="Ana sayfa">
        <span class="brand-mark">MK</span>
        <span>
          <strong>Minik Kaşifler</strong>
          <small>Çocuk Aktivite Portalı</small>
        </span>
      </a>
      <nav class="primary-nav" aria-label="Ana navigasyon">
        <button class="nav-link active" data-route="home">Keşfet</button>
        <button class="nav-link public-only" data-scroll="categoryShowcase">Kategoriler</button>
        <button class="nav-link public-only" data-scroll="aboutSection">Hakkımızda</button>
        <button class="nav-link" data-route="bookings">Rezervasyonlarım</button>
        <button class="nav-link" data-route="vendor">Satıcı Paneli</button>
        <button class="nav-link" data-route="support">Destek</button>
        <button class="nav-link" data-route="pricing">Planlar</button>
        <button class="nav-link notification-button" id="notificationNav" data-notifications hidden aria-label="Bildirimler">Bildirimler</button>
        <button class="nav-link" data-route="auth" id="authNav">Giriş</button>
      </nav>
      <button class="mobile-menu" id="mobileMenu" aria-label="Menüyü aç">☰</button>
    </header>

    <main id="app"></main>
    <div class="global-orbs" aria-hidden="true">
      <span class="orb orb-accent" data-parallax="0.1"></span>
      <span class="orb orb-teal" data-parallax="0.16"></span>
      <span class="orb orb-coral" data-parallax="0.22"></span>
    </div>

    <aside class="toast" id="toast" aria-live="polite"></aside>

    <template id="homeTemplate">
      <section class="hero discovery-hero">
        <div class="hero-content-grid">
          <div class="hero-copy-block">
            <p class="pill-label">Çocuklar için güvenilir aktiviteler</p>
            <h1>Çocuğunuz İçin <br><span>Eğlenceli &amp; Eğitici</span><br>Dünyayı Keşfedin</h1>
            <p class="hero-copy">
              Sanat, bilim, spor, doğa ve online atölyeler. Yaşa, ilgi alanına ve konuma göre seçilmiş etkinlikleri tek yerden bulun.
            </p>
            <form class="hero-search" id="heroSearch">
              <label>
                <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>
                <input name="query" type="search" placeholder="Robotik, resim, müze..." />
              </label>
              <label>
                <i class="fa-solid fa-location-dot" aria-hidden="true"></i>
                <select name="location">
                  <option value="Tümü">Tüm Konumlar</option>
                  <option value="Online">Online</option>
                </select>
              </label>
              <button class="primary-action" type="submit">Ara</button>
            </form>
            <div class="popular-searches">
              <span>Popüler:</span>
              <button data-search-tag="Bilim/STEM">Robotik</button>
              <button data-search-tag="Spor">Yüzme</button>
              <button data-search-tag="Sanat atölyesi">Resim</button>
            </div>
          </div>
          <div class="hero-visual-card" aria-hidden="true">
            <img src="assets/hero-workshop.png" alt="" />
            <div class="floating-badge top"><strong>Sanat</strong><span>Atölyeler</span></div>
            <div class="floating-badge bottom"><strong>Online</strong><span>Canlı ders</span></div>
          </div>
        </div>
      </section>

      <section class="quick-stats" aria-label="MVP özeti">
        <article><strong data-stat="activityCount">0</strong><span>yayındaki etkinlik</span></article>
        <article><strong data-stat="sessionCount">0</strong><span>aktif seans</span></article>
        <article><strong>7/24</strong><span>destek ve onay akışı</span></article>
        <article><strong>24s</strong><span>varsayılan ücretsiz iptal</span></article>
      </section>

      <section class="category-showcase" id="categoryShowcase">
        <div class="section-heading centered-heading">
          <div>
            <p class="eyebrow">Kategoriler</p>
            <h2>Neler keşfetmek istersiniz?</h2>
            <p class="muted">Çocuğunuzun ilgi alanlarına uygun etkinlikleri hızlıca filtreleyin.</p>
          </div>
        </div>
        <div class="category-grid" id="categoryGrid"></div>
      </section>

      <section class="section-shell" id="results">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Marketplace</p>
            <h2>Etkinlikleri keşfet</h2>
          </div>
          <button class="ghost-action" id="resetFilters">Filtreleri temizle</button>
        </div>
        <form class="filters" id="filters">
          <label>
            Arama
            <input name="query" type="search" placeholder="Sanat, STEM, müze..." />
          </label>
          <label>
            Kategori
            <select name="category"></select>
          </label>
          <label>
            Yaş
            <select name="age"></select>
          </label>
          <label>
            İlçe
            <select name="district"></select>
          </label>
          <label>
            Etkinlik tipi
            <select name="type"></select>
          </label>
          <label>
            Maks. fiyat
            <input name="maxPrice" type="range" min="250" max="10000" step="50" value="10000" />
            <span class="range-value" id="maxPriceLabel">₺10000</span>
          </label>
        </form>
        <div class="activity-grid" id="activityGrid"></div>
      </section>

      <section class="about-band" id="aboutSection">
        <div class="about-media">
          <img src="assets/hero-workshop.png" alt="Çocuk etkinliklerinden kareler" />
          <div class="about-counter"><strong>10k+</strong><span>mutlu çocuk</span></div>
        </div>
        <div class="about-content">
          <p class="eyebrow">Hakkımızda</p>
          <h2>Neden Minik Kaşifler?</h2>
          <p>Amacımız, çocukların potansiyellerini keşfetmelerine yardımcı olmak ve ebeveynlerin güvenilir, kaliteli aktivitelere kolayca ulaşmasını sağlamaktır.</p>
          <div class="about-points">
            <article><i class="fa-solid fa-shield-halved" aria-hidden="true"></i><div><strong>Güvenilir kurumlar</strong><span>Firmalar ve etkinlikler admin onayından geçer.</span></div></article>
            <article><i class="fa-solid fa-bullseye" aria-hidden="true"></i><div><strong>Yaşa uygun içerik</strong><span>Filtreler, seanslar ve çocuk profilleri birlikte çalışır.</span></div></article>
            <article><i class="fa-solid fa-bolt" aria-hidden="true"></i><div><strong>Kolay rezervasyon</strong><span>Seansı seçin, çocuğu belirleyin, yerinizi ayırın.</span></div></article>
          </div>
        </div>
      </section>

      <section class="newsletter-band">
        <div>
          <h2>Yeni etkinlikleri kaçırmayın</h2>
          <p>Haftalık öneriler ve öne çıkan çocuk aktiviteleri için bültene katılın.</p>
        </div>
        <form id="newsletterForm">
          <input name="email" type="email" required placeholder="E-posta adresiniz" />
          <button class="primary-action" type="submit">Kayıt ol</button>
        </form>
      </section>

      <footer class="site-footer" id="siteFooter"></footer>
    </template>
  </body>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</html>
